# -*- coding: utf-8 -*-
# Non-secret application configuration

image:
  max_size_mb: 20
  allowed_types:
    - "image/jpeg"
    - "image/png"
    - "image/webp"

video:
  max_size_mb: 200
  allowed_types:
    - "video/mp4"
    - "video/mov"
    - "video/webm"

storage:
  temp_dir: "tmp/"
  uploads_dir: "uploads/"
  processed_dir: "processed/"
